<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Submission</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Test Submission</h1>
        <p>This page tests the submission functionality without any complex form data.</p>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Test Options</h5>
                
                <div class="mb-3">
                    <button id="testSimpleBtn" class="btn btn-primary">Test Simple Submission</button>
                    <small class="text-muted ms-2">Tests a simple fetch to submit_report_test.php</small>
                </div>
                
                <div class="mb-3">
                    <button id="testOriginalBtn" class="btn btn-warning">Test Original Submission</button>
                    <small class="text-muted ms-2">Tests a fetch to the original submit_report.php</small>
                </div>
                
                <div class="mb-3">
                    <button id="testFixedBtn" class="btn btn-success">Test Fixed Submission</button>
                    <small class="text-muted ms-2">Tests a fetch to submit_report_fixed.php</small>
                </div>
                
                <hr>
                
                <div id="resultContainer" class="alert alert-info" style="display: none;">
                    <h5>Result:</h5>
                    <pre id="resultContent"></pre>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('testSimpleBtn').addEventListener('click', function() {
            testSubmission('submit_report_test.php');
        });
        
        document.getElementById('testOriginalBtn').addEventListener('click', function() {
            testSubmission('submit_report.php');
        });
        
        document.getElementById('testFixedBtn').addEventListener('click', function() {
            testSubmission('submit_report_fixed.php');
        });
        
        function testSubmission(endpoint) {
            // Show loading
            Swal.fire({
                title: 'Testing...',
                text: 'Sending request to ' + endpoint,
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });
            
            // Create minimal form data
            const formData = new FormData();
            formData.append('appointment_id', '101');
            formData.append('area', '100');
            formData.append('notes', 'Test notes');
            formData.append('recommendation', 'Test recommendation');
            formData.append('problem_area', 'Test area');
            formData.append('pest_types[]', 'Ants');
            formData.append('type_of_work[]', 'General Pest Control');
            formData.append('preferred_date', '2025-05-20');
            formData.append('preferred_time', '10:00');
            formData.append('frequency', 'one-time');
            formData.append('selected_chemicals', '[{"id":"1","name":"Imidaclopred","type":"Insecticide","dosage":"20","dosage_unit":"ml","target_pest":"Crawling & Flying Pest"}]');
            
            // Set timeout
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 second timeout
            
            // Send request
            fetch(endpoint, {
                method: 'POST',
                body: formData,
                signal: controller.signal
            })
            .then(response => {
                clearTimeout(timeoutId);
                return response.text();
            })
            .then(text => {
                let result;
                try {
                    result = JSON.parse(text);
                    showResult(true, result);
                } catch (e) {
                    showResult(false, { error: 'Invalid JSON response', raw: text });
                }
            })
            .catch(error => {
                clearTimeout(timeoutId);
                showResult(false, { 
                    error: error.name === 'AbortError' ? 'Request timed out after 10 seconds' : error.message 
                });
            });
        }
        
        function showResult(success, data) {
            // Close loading dialog
            Swal.close();
            
            // Show result
            const resultContainer = document.getElementById('resultContainer');
            const resultContent = document.getElementById('resultContent');
            
            resultContainer.style.display = 'block';
            resultContainer.className = success ? 'alert alert-success' : 'alert alert-danger';
            resultContent.textContent = JSON.stringify(data, null, 2);
            
            // Show alert
            Swal.fire({
                title: success ? 'Success!' : 'Error!',
                text: success ? 'Request completed successfully' : 'Request failed',
                icon: success ? 'success' : 'error'
            });
        }
    </script>
</body>
</html>
